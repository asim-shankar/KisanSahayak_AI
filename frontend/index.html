<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KisanSahayak AI - Smart Farming Dashboard</title>
    <link rel="stylesheet" href="leaf-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Dashboard Container -->
    <div class="dashboard-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="logo-section">
                <i class="fas fa-leaf"></i>
                <span>KisanSahayak</span>
            </div>
            
            <nav class="sidebar-nav">
                <ul>
                    <li class="nav-item active">
                        <i class="fas fa-th-large"></i>
                        <span>Dashboard</span>
                    </li>
                    <li class="nav-item">
                        <i class="fas fa-seedling"></i>
                        <span>Crop</span>
                    </li>
                    <li class="nav-item">
                        <i class="fas fa-plant-wilt"></i>
                        <span>Crop Health</span>
                    </li>
                    <li class="nav-item">
                        <i class="fas fa-plus"></i>
                        <span>New</span>
                    </li>
                    <li class="nav-item">
                        <i class="fas fa-exclamation-triangle"></i>
                        <span>Pest Alerts</span>
                    </li>
                    <li class="nav-item">
                        <i class="fas fa-cog"></i>
                        <span>Settings</span>
                    </li>
                    <li class="nav-item">
                        <i class="fas fa-sign-out-alt"></i>
                        <span>Log out</span>
                    </li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Top Header -->
            <header class="top-header">
                <div class="header-left">
                    <h1><i class="fas fa-th"></i> Crop Overview</h1>
                </div>
                <div class="header-right">
                    <!-- Enhanced Search Container -->
                    <div class="search-container">
                        <i class="fas fa-search"></i>
                        <input type="text" placeholder="Search crops (rice, wheat, cotton...)" id="crop-search-input">
                        <button class="search-btn" onclick="searchCrops()" title="Search Crops">
                            <i class="fas fa-leaf"></i>
                        </button>
                    </div>
                    
                    <!-- New Feature Buttons -->
                    <div class="feature-buttons">
                        <button class="feature-btn weather-btn" onclick="getWeatherConditions()" title="Weather Conditions">
                            <i class="fas fa-cloud-sun"></i>
                            <span>Weather</span>
                        </button>
                        
                        <button class="feature-btn image-btn" onclick="triggerImageUpload()" title="Analyze Crop Image">
                            <i class="fas fa-camera"></i>
                            <span>Image</span>
                        </button>
                        
                        <button class="feature-btn voice-btn" onclick="triggerVoiceRecognition()" title="Voice Recognition">
                            <i class="fas fa-microphone"></i>
                            <span>Voice</span>
                        </button>
                    </div>
                    
                    <!-- Hidden File Inputs -->
                    <input type="file" id="hidden-image-input" accept="image/*" style="display: none;" onchange="analyzeImage()">
                    <input type="file" id="hidden-audio-input" accept="audio/*" style="display: none;" onchange="processVoiceFile()">
                    
                    <!-- Header Icons -->
                    <div class="header-icons">
                        <i class="fas fa-question-circle"></i>
                        <i class="fas fa-bell"></i>
                        <i class="fas fa-cog"></i>
                        <div class="user-avatar">
                            <img src="https://via.placeholder.com/32x32/4CAF50/FFFFFF?text=U" alt="User">
                        </div>
                    </div>
                </div>
            </header>

            <!-- Crop Health Status Cards -->
            <section class="status-cards">
                <h2>Crop Health Status</h2>
                <div class="cards-grid" id="status-cards-grid">
                    <!-- Cards will be dynamically populated -->
                </div>
            </section>

            <!-- AI Features Section -->
            <section class="ai-features">
                <div class="features-left">
                    <!-- Recommendations -->
                    <div class="recommendations-section">
                        <h2>AI Recommendations</h2>
                        <div class="recommendation-cards" id="recommendation-cards">
                            <!-- Recommendations will be populated here -->
                        </div>
                    </div>

                    <!-- Recent Crop Reports -->
                    <div class="crop-reports">
                        <h2>Recent Crop Reports</h2>
                        <div class="reports-table" id="reports-table">
                            <!-- Reports will be populated here -->
                        </div>
                    </div>
                </div>

                <div class="features-right">
                    <!-- Chat with Smart Advisor -->
                    <div class="chat-section">
                        <h3><i class="fas fa-robot"></i> AI Chat Assistant</h3>
                        <div class="chat-container" id="chat-container">
                            <!-- Chat messages will appear here -->
                        </div>
                        <div class="chat-input">
                            <input type="text" id="chat-input" placeholder="Ask your farming question..." maxlength="500">
                            <button onclick="sendChatMessage()" title="Send message">
                                <i class="fas fa-paper-plane"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Search Results Panel -->
    <div id="search-results-panel" class="search-results-panel" style="display: none;">
        <div class="panel-header">
            <h3><i class="fas fa-search"></i> Search Results</h3>
            <button class="close-panel" onclick="closeSearchPanel()">&times;</button>
        </div>
        <div id="search-results-content" class="panel-content">
            <!-- Search results will be populated here -->
        </div>
    </div>

    <!-- Analysis Results Modal -->
    <div id="analysis-modal" class="analysis-modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Analysis Results</h3>
                <button class="close-modal" onclick="closeAnalysisModal()">&times;</button>
            </div>
            <div id="modal-body" class="modal-body">
                <!-- Analysis results will be populated here -->
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay" style="display: none;">
        <div class="spinner"></div>
        <p>Processing your request...</p>
    </div>

    <!-- JavaScript -->
    <script src="dashboard.js"></script>
</body>
</html>
